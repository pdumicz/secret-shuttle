<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Secret Shuttle Approval</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; max-width: 36rem; margin: 2rem auto; padding: 1rem; }
      .card { border: 1px solid #ccc; border-radius: 8px; padding: 1rem; }
      .row { display: flex; justify-content: space-between; padding: 0.25rem 0; }
      .label { color: #555; }
      button { font-size: 1rem; padding: 0.5rem 1rem; margin-right: 0.5rem; }
      .approve { background: #0a7; color: #fff; border: 0; }
      .deny { background: #c33; color: #fff; border: 0; }
      .status { margin-top: 1rem; }
    </style>
  </head>
  <body>
    <h1>Secret Shuttle</h1>
    <div class="card" id="grant"></div>
    <div id="actions"></div>
    <div class="status" id="status"></div>
    <script type="module">
      const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
      const params = new URLSearchParams(location.search);
      const id = params.get("id");
      const token = params.get("token");
      // ── Plan 4b: hub integration ────────────────────────────────
      const rawHubSeq = params.get("hub_seq");
      const parsedHubSeq = rawHubSeq === null ? null : Number(rawHubSeq);
      const hasHubSeq = parsedHubSeq !== null && Number.isSafeInteger(parsedHubSeq) && parsedHubSeq > 0;

      function notifyHubIfFramed() {
        if (!hasHubSeq) return;
        if (window.parent !== window) {
          window.parent.postMessage({ type: "operation_done", seq: parsedHubSeq }, location.origin);
        }
      }

      const terminalStatuses = new Set(["granted", "denied", "expired", "used"]);
      let pollTimer = null;
      async function pollForTerminal() {
        try {
          const r = await fetch(`/ui/approvals/${id}?token=${token}`);
          if (!r.ok) return;
          const body = await r.json();
          if (terminalStatuses.has(body.status)) {
            stopPolling();
            notifyHubIfFramed();
          }
        } catch { /* network blip; next tick will retry */ }
      }
      function startPolling() { pollTimer = setInterval(pollForTerminal, 2000); }
      function stopPolling() { if (pollTimer !== null) { clearInterval(pollTimer); pollTimer = null; } }
      window.addEventListener("beforeunload", stopPolling);
      // ────────────────────────────────────────────────────────────
      async function load() {
        const r = await fetch(`/ui/approvals/${id}?token=${token}`);
        const g = await r.json();
        const human = {
          inject: `Inject secret ${esc(g.ref ?? "")} into the focused field on ${esc(g.destination_domain ?? "?")}`,
          capture: `Capture a new secret (${esc(g.planned_ref ?? "")}) from ${esc(g.destination_domain ?? "?")}`,
          generate: `Generate and store a new secret ${esc(g.planned_ref ?? "")} (${esc(g.environment)})`,
          compare: `Compare the focused field on ${esc(g.destination_domain ?? "?")} against ${esc(g.ref ?? "")}`,
          template: `Run template ${esc(g.template_id ?? "")} with secret ${esc(g.ref ?? "")}`,
          // NOTE: only the literal <b> tags are static HTML here; every interpolated value MUST stay esc()-wrapped (spliced raw at <p><b>${human}</b></p>).
          inject_submit: `Inject secret ${esc(g.ref ?? "")} into <b>${esc(g.field_handle_label ?? "?")}</b> on ${esc(g.destination_domain ?? "?")}, click <b>${esc(g.submit_handle_label ?? "?")}</b>, wait for success, and automatically resume observation only if the secret is verified gone`,
          reveal_capture: `Click <b>${esc(g.reveal_handle_label ?? "?")}</b> on ${esc(g.destination_domain ?? "?")}, capture the revealed secret into ${esc(g.planned_ref ?? "")} (from <b>${esc(g.field_handle_label ?? g.container_handle_label ?? "?")}</b>, mode <code>${esc(g.capture_mode ?? "?")}</code>), hide it, and automatically resume observation only if the secret is verified gone`,
          blind_end: `Resume browser observation for ${esc(g.destination_domain ?? "?")}`,
          secrets_delete: `Delete the secret ${esc(g.ref ?? "")} from the vault (audit trail preserved).`,
          secrets_rotate: `Rotate the secret ${esc(g.ref ?? "")}: generate a new value and mark the old as rotating.`,
          run: `Resolve secret refs and inject them as env vars for the spawned command (refs visible in this approval; values stay in the daemon; child stdout/stderr are masked before relay).`,
          run_stdin: `Resolve secret ${esc(g.ref ?? "")} and pipe its value to the child's stdin (fd 0). The daemon writes the bytes directly; the CLI process never sees the plaintext. Child stdout/stderr are masked before relay. Use for tools that read secrets from stdin: gh auth login --with-token, docker login --password-stdin, kubectl create secret ... --from-file=-.`,
          inject_render: `Resolve secret refs and write the rendered template file (refs visible in this approval; values are written to disk at mode 0600 inside $HOME).`,
        }[g.action] || `${esc(g.action)}`;
        const scope = Array.isArray(g.allowed_domains) && g.allowed_domains.length
          ? g.allowed_domains.map(esc).join(", ") : "(none yet — not injectable)";
        document.getElementById("grant").innerHTML = `
          <p style="font-size:1.1rem"><b>${human}</b></p>
          <div class="row"><span class="label">Environment</span><b>${esc(g.environment)}</b></div>
          ${g.page_title ? `<div class="row"><span class="label">Page</span><b>${esc(g.page_title)}</b></div>` : ""}
          ${g.page_url_host ? `<div class="row"><span class="label">URL host</span><code>${esc(g.page_url_host)}</code></div>` : ""}
          <div class="row"><span class="label">Injectable into</span><b>${scope}</b></div>
          ${Array.isArray(g.allowed_actions) && g.allowed_actions.length ? `<div class="row"><span class="label">Action scope</span><b>${g.allowed_actions.map(esc).join(", ")}</b></div>` : ""}
          ${g.template_id ? `<div class="row"><span class="label">Template</span><b>${esc(g.template_id)}</b></div>` : ""}
          ${g.template_params ? Object.keys(g.template_params).sort().map((k) =>
            `<div class="row"><span class="label">param: ${esc(k)}</span><code>${esc(g.template_params[k])}</code></div>`).join("") : ""}
          ${g.success_condition ? `<div class="row"><span class="label">Success marker</span><code>${esc(g.success_condition)}</code></div>` : ""}
          ${g.capture_mode ? `<div class="row"><span class="label">Capture mode</span><code>${esc(g.capture_mode)}</code></div>` : ""}
          <details style="margin-top:.5rem">
            <summary class="label">Technical details</summary>
            ${g.template_binary_path ? `<div class="row"><span class="label">Binary</span><code>${esc(g.template_binary_path)}</code></div>` : ""}
            ${g.template_binary_sha256 ? `<div class="row"><span class="label">Binary sha256</span><code>${esc(g.template_binary_sha256)}</code></div>` : ""}
            ${g.target_id ? `<div class="row"><span class="label">Browser target</span><code>${esc(g.target_id)}</code></div>` : ""}
            ${g.field_fingerprint ? `<div class="row"><span class="label">Field fingerprint</span><code>${esc(g.field_fingerprint)}</code></div>` : ""}
            ${g.submit_fingerprint ? `<div class="row"><span class="label">Submit fingerprint</span><code>${esc(g.submit_fingerprint)}</code></div>` : ""}
            ${g.reveal_fingerprint ? `<div class="row"><span class="label">Reveal fingerprint</span><code>${esc(g.reveal_fingerprint)}</code></div>` : ""}
            ${g.hide_fingerprint ? `<div class="row"><span class="label">Hide fingerprint</span><code>${esc(g.hide_fingerprint)}</code></div>` : ""}
            ${g.container_fingerprint ? `<div class="row"><span class="label">Container fingerprint</span><code>${esc(g.container_fingerprint)}</code></div>` : ""}
          </details>
          ${g.action === "blind_end" ? `<div class="row" style="color:#c33"><b>Approving navigates open pages to about:blank and resumes observation. Approve only if the secret has been saved/submitted and is no longer visible.</b></div>` : ""}
          ${(g.action === "inject_submit" || g.action === "reveal_capture") ? `<div class="row" style="color:#c33"><b>Approving authorizes the daemon to auto-resume observation only if the secret is verified gone (success/capture and absence checks pass). If they do not, blind mode stays on.</b></div>` : ""}
        `;
        document.getElementById("status").textContent = `Status: ${g.status}`;
      }
      async function send(action) {
        const r = await fetch(`/ui/approvals/${id}/${action}?token=${token}`, { method: "POST" });
        if (r.ok) {
          document.getElementById("status").textContent = `Status: ${action}d`;
          stopPolling();
          notifyHubIfFramed();
        }
        // On !r.ok: leave polling active. If the daemon actually committed
        // (race), the next poll catches the terminal status and notifies.
      }
      document.getElementById("actions").innerHTML = `
        <button class="approve" id="ok">Approve</button>
        <button class="deny" id="no">Deny</button>
      `;
      document.getElementById("ok").addEventListener("click", () => send("approve"));
      document.getElementById("no").addEventListener("click", () => send("deny"));
      load().then(() => startPolling());
    </script>
  </body>
</html>
