<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Secret Shuttle Hub</title>
  <meta name="referrer" content="no-referrer">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, system-ui, sans-serif; }
    #status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      height: 32px;
      padding: 0 0.75rem;
      background: #f0f0f3;
      border-bottom: 1px solid #d1d1d6;
      font-size: 0.85rem;
      color: #444;
    }
    #status .dot {
      width: 8px; height: 8px; border-radius: 50%; background: #999;
    }
    #status.connected .dot { background: #0a7a3b; }
    #status.reconnecting .dot { background: #c99a00; }
    #status.disconnected .dot, #status.displaced .dot { background: #c2331a; }
    #op {
      width: 100%;
      height: calc(100% - 32px);
      border: 0;
    }
    /* Terminal states hide the iframe AND show the banner. Without
       this, a displaced tab's still-loaded /ui/approve iframe stays
       clickable — the user could approve operations the new tab is
       supposed to be driving. */
    #status.disconnected ~ #op, #status.displaced ~ #op { display: none; }
    #banner {
      display: none;
      padding: 1rem;
      color: #444;
      font-size: 1rem;
      line-height: 1.4;
    }
    #status.disconnected ~ #banner, #status.displaced ~ #banner { display: block; }
    #banner button {
      font-size: 1rem;
      padding: 0.5rem 1rem;
      margin-top: 0.75rem;
      background: #0a7a3b;
      color: #fff;
      border: 0;
      border-radius: 6px;
      cursor: pointer;
    }
    #banner button:hover { background: #086030; }
    /* Capture coordinator card (C14). Rendered on the hub page itself —
       not inside the operation iframe — because the card is the UI for a
       raw POST flow (no token-bearing approval grant) and the hub already
       owns the SSE channel that carries the capture_token. While the card
       is visible, the iframe is hidden so the user is not tempted to
       interact with a stale approval page. */
    #capture { display: none; padding: 1rem; }
    #capture.active { display: block; }
    #status.capture ~ #op { display: none; }
    #capture .card {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 1rem;
      max-width: 36rem;
    }
    #capture h2 { margin-top: 0; font-size: 1.1rem; }
    #capture .row { display: flex; justify-content: space-between; padding: 0.25rem 0; }
    #capture .label { color: #555; }
    #capture .actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
    #capture button {
      font-size: 1rem;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      border: 0;
      cursor: pointer;
    }
    #capture .capture { background: #0a7a3b; color: #fff; }
    #capture .skip { background: #888; color: #fff; }
    #capture .abandon { background: #c2331a; color: #fff; }
  </style>
</head>
<body>
  <div id="status" class="connected">
    <span class="dot" aria-hidden="true"></span>
    <span id="status-text">Connected</span>
    <span style="margin-left:auto;color:#888" id="status-port"></span>
  </div>
  <iframe id="op" sandbox="allow-scripts allow-same-origin allow-forms"></iframe>
  <!-- Banner is populated by showBanner() with text + a recovery button.
       Reload is intentionally NOT the recovery path: history.replaceState
       strips the hub_token from the URL after bootstrap, so a bare reload
       hits /ui/hub with no token and 400s. The Take over / Reconnect
       button re-enters the active state using the closure-local token. -->
  <div id="banner"></div>
  <!-- C14: capture coordinator card. Populated by renderCaptureStep when a
       bootstrap_capture_step SSE event arrives. Buttons POST to the
       tokenized /ui/bootstrap/{capture-step,skip-step,abandon} raw routes
       (no daemon-token auth — the capture_token IS the auth). -->
  <div id="capture"></div>
  <script>
    (() => {
      const params = new URLSearchParams(location.search);
      const hubToken = params.get("token") ?? "";
      // Strip the hub_token from the address bar after bootstrap so it
      // no longer appears in screenshots, screen-sharing, Referer
      // headers, or window.parent.location.search reads from any
      // iframe content. The token survives only as a closure-local
      // JS variable, which (because it's not assigned to `window` or
      // any reachable global) is not accessible via
      // window.parent.hubToken from inside the iframe.
      try {
        history.replaceState({}, "", "/ui/hub");
      } catch { /* environments without history API (test stubs) — fine */ }
      const iframe = document.getElementById("op");
      const statusEl = document.getElementById("status");
      const statusText = document.getElementById("status-text");
      const statusPort = document.getElementById("status-port");
      const banner = document.getElementById("banner");
      const captureEl = document.getElementById("capture");
      const esc = (s) => String(s).replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));

      statusPort.textContent = `port ${location.port}`;

      let terminal = false;
      let consecutiveFailures = 0;
      let es = null;

      function showBanner(text, kind) {
        statusEl.className = kind || "";
        statusText.textContent = text;
        if (kind === "disconnected" || kind === "displaced") {
          // Drop the operation page so a displaced/terminal tab cannot
          // continue approving operations the user thought were handed
          // off. The CSS rule above also hides the iframe element so
          // there's no clickable surface even if about:blank is slow.
          if (iframe.src !== "about:blank") {
            iframe.src = "about:blank";
          }
          // Drop any in-flight capture card too: a displaced or terminal
          // tab must not let the user POST to /ui/bootstrap/* on routes
          // the new driver may already be handling.
          captureEl.className = "";
          captureEl.innerHTML = "";
          // Populate the banner with text + a recovery button. Reload
          // is NOT the recovery path: history.replaceState stripped the
          // hub_token from the URL, so a reload hits /ui/hub with no
          // token and 400s. The button uses the closure-local hubToken
          // to re-issue an EventSource without leaving this page.
          banner.innerHTML = "";
          const p = document.createElement("p");
          p.textContent = text;
          banner.appendChild(p);
          const btn = document.createElement("button");
          btn.textContent = kind === "displaced" ? "Take over here" : "Reconnect";
          btn.addEventListener("click", takeOver);
          banner.appendChild(btn);
        } else {
          banner.innerHTML = "";
        }
      }

      function takeOver() {
        // Re-enter the active state without reloading the page.
        // - terminal=false re-enables iframe→hub postMessage handling.
        // - consecutiveFailures=0 resets the strikes-out counter.
        // - statusEl class flips to "reconnecting", which removes the
        //   CSS rule hiding #op, so the iframe area is interactive
        //   again as soon as the next navigate arrives.
        // connect() opens a fresh EventSource; if another tab was
        // attached, the broker's attach() will displace it. The
        // resend of activeUrl reloads whatever operation was pending.
        terminal = false;
        consecutiveFailures = 0;
        banner.innerHTML = "";
        statusEl.className = "reconnecting";
        statusText.textContent = "Reconnecting…";
        connect();
      }

      function handleNavigate(url) {
        // Any prior bootstrap_capture_step card is implicitly stale once the
        // executor advances to a different operation — hide it before
        // surfacing the navigate so the user never sees a stale card on top
        // of a fresh iframe.
        hideCaptureStep();
        iframe.src = url;
      }

      function hideCaptureStep() {
        captureEl.className = "";
        captureEl.innerHTML = "";
        if (statusEl.className === "capture") {
          statusEl.className = "connected";
          statusText.textContent = "Connected";
        }
      }

      // C14: render the bootstrap_capture_step coordinator card. The
      // capture_token in the event payload is the only piece the UI cannot
      // derive itself — it is minted by the executor between register and
      // emit. Each button POSTs to a tokenized /ui/bootstrap/* raw route
      // (no daemon-token auth) and then hides the card to wait for the next
      // SSE event (either another bootstrap_capture_step for the next plan
      // entry, or a navigate when the executor moves on).
      function renderCaptureStep(event) {
        // event.step_idx is already 1-based (executor.ts increments entryIdx
        // BEFORE emitting the event), so render as-is. The drift guard in
        // hub-ui-html-drift.test.ts asserts the absence of "+ 1" here.
        const stepLabel = `step ${event.step_idx} of ${event.step_total}`;
        captureEl.innerHTML = `
          <div class="card">
            <h2>Capture <code>${esc(event.secret_name)}</code></h2>
            <div class="row"><span class="label">Open</span><a href="${esc(event.url)}" target="_blank" rel="noopener noreferrer">${esc(event.url)}</a></div>
            <div class="row"><span class="label">Progress</span><b>${esc(stepLabel)}</b></div>
            <div class="actions">
              <button class="capture" id="capture-btn">Capture</button>
              <button class="skip" id="skip-btn">Skip</button>
              <button class="abandon" id="abandon-btn">Abandon</button>
            </div>
          </div>
        `;
        captureEl.className = "active";
        statusEl.className = "capture";
        statusText.textContent = "Awaiting capture";

        const token = encodeURIComponent(event.capture_token);
        async function post(url) {
          try {
            await fetch(url, { method: "POST" });
          } catch { /* network blip — server will time out the pending capture */ }
          hideCaptureStep();
        }
        // Route URLs spelled out as literals (no template interpolation of the
        // path segment) so drift-guard greps can match the exact route strings
        // the daemon serves.
        document.getElementById("capture-btn").addEventListener("click", () => post(`/ui/bootstrap/capture-step?token=${token}`));
        document.getElementById("skip-btn").addEventListener("click", () => post(`/ui/bootstrap/skip-step?token=${token}`));
        document.getElementById("abandon-btn").addEventListener("click", () => post(`/ui/bootstrap/abandon?token=${token}`));
      }

      function onMessage(ev) {
        const data = JSON.parse(ev.data);
        if (data.type === "displaced") {
          terminal = true;
          if (es) es.close();
          showBanner("Another tab is now driving Secret Shuttle. Click below to take over here.", "displaced");
          return;
        }
        if (data.type === "navigate") {
          handleNavigate(data.url);
          return;
        }
        if (data.type === "bootstrap_capture_step") {
          renderCaptureStep(data);
          return;
        }
      }

      function connect() {
        es = new EventSource(`/ui/hub/stream?token=${encodeURIComponent(hubToken)}`);
        es.addEventListener("open", () => {
          consecutiveFailures = 0;
          showBanner("Connected", "connected");
        });
        es.addEventListener("message", onMessage);
        es.addEventListener("error", () => {
          if (terminal) return;
          es.close();
          consecutiveFailures += 1;
          if (consecutiveFailures < 2) {
            showBanner("Reconnecting…", "reconnecting");
            setTimeout(connect, 1000);
          } else {
            terminal = true;
            showBanner("Disconnected from Secret Shuttle. Click below to reconnect.", "disconnected");
          }
        });
      }

      const doneInFlight = new Set();
      let lastCompletedSeq = 0;

      function shouldPostDone(seq) {
        if (seq <= lastCompletedSeq) return false;
        if (doneInFlight.has(seq)) return false;
        doneInFlight.add(seq);
        return true;
      }

      async function postDone(seq) {
        const MAX_ATTEMPTS = 5;
        const BASE_DELAY_MS = 250;
        let succeeded = false;
        try {
          for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt++) {
            try {
              const r = await fetch(`/ui/hub/done?token=${encodeURIComponent(hubToken)}`, {
                method: "POST",
                headers: { "content-type": "application/json" },
                body: JSON.stringify({ seq }),
              });
              if (r.ok) { succeeded = true; return; }
              if (r.status === 401 || r.status === 403 || r.status === 400) break;
            } catch {
              // Network failure; retry.
            }
            await new Promise((resolve) => setTimeout(resolve, BASE_DELAY_MS * (attempt + 1)));
          }
          terminal = true;
          if (es) es.close();
          showBanner("Failed to advance Secret Shuttle. Click below to reconnect.", "disconnected");
        } finally {
          doneInFlight.delete(seq);
          if (succeeded) lastCompletedSeq = Math.max(lastCompletedSeq, seq);
        }
      }

      window.addEventListener("message", (ev) => {
        if (terminal) return;
        if (ev.origin !== location.origin) return;
        if (ev.source !== iframe.contentWindow) return;
        const data = ev.data;
        if (!data || data.type !== "operation_done") return;
        if (!Number.isSafeInteger(data.seq) || data.seq <= 0) return;
        if (!shouldPostDone(data.seq)) return;
        postDone(data.seq);
      });

      connect();
    })();
  </script>
</body>
</html>
