<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 784 452" width="784" height="452" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" role="img" aria-label="Terminal: an AI agent drives an arbitrary vendor portal and hands off the secret moment to secret-shuttle, capturing a key into the vault without ever seeing it. Experimental path.">
  <style>
    /* opacity:1 base + backwards fill => animates the staggered reveal when CSS
       animations run, and degrades to fully-visible (never blank) when they don't. */
    .l { opacity: 1; animation: fi .45s ease backwards; }
    @keyframes fi { from { opacity: 0; } to { opacity: 1; } }
    .cur { opacity: 0; animation: curblink 1.05s step-end infinite; animation-delay: 5.6s; }
    @keyframes curblink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
    text { font-size: 13.5px; }
  </style>

  <rect x="2" y="2" width="780" height="448" rx="11" fill="#1a1a1c" stroke="#2c2c2e" stroke-width="1.5"/>
  <path d="M2 13 a11 11 0 0 1 11 -11 h758 a11 11 0 0 1 11 11 v25 h-780 z" fill="#2c2c2e"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="64" cy="20" r="6" fill="#28c840"/>
  <text x="392" y="24" text-anchor="middle" fill="#8c8c92" font-size="12">agent drives any portal — secret-shuttle owns just the secret moment   <tspan fill="#8f5a0a">(experimental · v0.5)</tspan></text>

  <text class="l" style="animation-delay:.30s" x="24" y="66"><tspan fill="#8c8c92">$ </tspan><tspan fill="#d8d8db">secret-shuttle browser start</tspan></text>
  <text class="l" style="animation-delay:.70s" x="24" y="89"><tspan fill="#28c840">✓</tspan><tspan fill="#8c8c92"> Chrome ready · proxy ws://127.0.0.1/cdp/…   (raw CDP never exposed)</tspan></text>
  <text class="l" style="animation-delay:1.00s" x="24" y="112"><tspan fill="#6b6b72">↳ drive it with your own browser tool (Playwright / browser-use / harness)</tspan></text>
  <text class="l" style="animation-delay:1.30s" x="24" y="135"><tspan fill="#6b6b72"># agent navigates normally →  dashboard.acme.dev/settings/api-keys</tspan></text>

  <text class="l" style="animation-delay:1.80s" x="24" y="171"><tspan fill="#8c8c92">$ </tspan><tspan fill="#d8d8db">secret-shuttle browser mark focused --as keyfield</tspan></text>
  <text class="l" style="animation-delay:2.10s" x="24" y="194"><tspan fill="#8c8c92">$ </tspan><tspan fill="#d8d8db">secret-shuttle browser mark pick --as revealbtn   </tspan><tspan fill="#6b6b72"># you click; daemon records</tspan></text>
  <text class="l" style="animation-delay:2.45s" x="24" y="217"><tspan fill="#28c840">✓</tspan><tspan fill="#8c8c92"> marked  </tspan><tspan fill="#f6c878">⟨ opaque handles — no selector or value leaves the daemon ⟩</tspan></text>

  <text class="l" style="animation-delay:2.95s" x="24" y="253"><tspan fill="#8c8c92">$ </tspan><tspan fill="#d8d8db">secret-shuttle reveal-capture --name ACME_KEY --env production --source acme \</tspan></text>
  <text class="l" style="animation-delay:3.25s" x="24" y="276"><tspan fill="#d8d8db">    --reveal-handle revealbtn --field-handle keyfield --allow-domain dashboard.acme.dev</tspan></text>
  <text class="l" style="animation-delay:3.65s" x="24" y="299"><tspan fill="#f0b84a">… blind mode</tspan><tspan fill="#8c8c92"> — your view severed while the daemon reveals + reads the value</tspan></text>
  <text class="l" style="animation-delay:4.05s" x="24" y="322"><tspan fill="#28c840">✓</tspan><tspan fill="#8c8c92"> captured → </tspan><tspan fill="#c39bff">ss://acme/prod/ACME_KEY</tspan><tspan fill="#8c8c92">   fp:4d1e…7a   value </tspan><tspan fill="#f6c878">⟨ never seen ⟩</tspan></text>

  <text class="l" style="animation-delay:4.60s" x="24" y="358"><tspan fill="#6b6b72"># no recipe, no selector — works on a portal nobody integrated.</tspan></text>
  <text class="l" style="animation-delay:4.95s" x="24" y="381"><tspan fill="#6b6b72"># </tspan><tspan fill="#8f5a0a">experimental · best-effort · pending real-page dogfood</tspan></text>

  <rect class="cur" x="24" y="405" width="9" height="16" fill="#f6c878"/>
</svg>
