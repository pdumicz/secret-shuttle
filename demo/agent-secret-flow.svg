<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 462" width="760" height="462" font-family="ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace" role="img" aria-label="Terminal: an AI agent generates a secret and ships it to Vercel production without ever seeing the value.">
  <style>
    /* opacity:1 base + backwards fill => animates the staggered reveal when CSS
       animations run, and degrades to fully-visible (never blank) when they don't. */
    .l { opacity: 1; animation: fi .45s ease backwards; }
    @keyframes fi { from { opacity: 0; } to { opacity: 1; } }
    .cur { opacity: 0; animation: curblink 1.05s step-end infinite; animation-delay: 5.4s; }
    @keyframes curblink { 0%,50% { opacity: 1; } 50.01%,100% { opacity: 0; } }
    text { font-size: 13.5px; }
  </style>

  <!-- window -->
  <rect x="2" y="2" width="756" height="458" rx="11" fill="#1a1a1c" stroke="#2c2c2e" stroke-width="1.5"/>
  <!-- header -->
  <path d="M2 13 a11 11 0 0 1 11 -11 h734 a11 11 0 0 1 11 11 v25 h-756 z" fill="#2c2c2e"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="64" cy="20" r="6" fill="#28c840"/>
  <text x="380" y="24" text-anchor="middle" fill="#8c8c92" font-size="12">agent session — the value never enters the agent's context</text>

  <!-- body -->
  <text class="l" style="animation-delay:.30s" x="24" y="68"><tspan fill="#8c8c92">$ </tspan><tspan fill="#d8d8db">npx secret-shuttle init</tspan></text>
  <text class="l" style="animation-delay:.75s" x="24" y="91"><tspan fill="#28c840">✓</tspan><tspan fill="#8c8c92"> daemon started   </tspan><tspan fill="#28c840">✓</tspan><tspan fill="#8c8c92"> vault created   </tspan><tspan fill="#28c840">✓</tspan><tspan fill="#8c8c92"> keychain enrolled</tspan></text>
  <text class="l" style="animation-delay:1.05s" x="24" y="114"><tspan fill="#6b6b72">↳ passphrase entered in a browser window — the CLI never reads it</tspan></text>

  <text class="l" style="animation-delay:1.55s" x="24" y="150"><tspan fill="#8c8c92">$ </tspan><tspan fill="#d8d8db">secret-shuttle provision \</tspan></text>
  <text class="l" style="animation-delay:1.85s" x="24" y="173"><tspan fill="#d8d8db">    --secret APP_SECRET --from random_32_bytes --to vercel:production</tspan></text>
  <text class="l" style="animation-delay:2.25s" x="24" y="196"><tspan fill="#f0b84a">… approval_required</tspan><tspan fill="#8c8c92"> — you click Approve once in the popup</tspan></text>
  <text class="l" style="animation-delay:2.60s" x="24" y="219"><tspan fill="#28c840">✓</tspan><tspan fill="#8c8c92"> APP_SECRET generated in vault    </tspan><tspan fill="#28c840">✓</tspan><tspan fill="#8c8c92"> pushed to vercel:production</tspan></text>

  <text class="l" style="animation-delay:3.05s" x="24" y="255"><tspan fill="#8c8c92">$ </tspan><tspan fill="#d8d8db">secret-shuttle audit --since 1d</tspan></text>
  <text class="l" style="animation-delay:3.35s" x="24" y="278"><tspan fill="#8c8c92">  ref          </tspan><tspan fill="#c39bff">ss://local/prod/APP_SECRET</tspan></text>
  <text class="l" style="animation-delay:3.65s" x="24" y="301"><tspan fill="#8c8c92">  fingerprint  fp:9c8a3f…2b1d</tspan></text>
  <text class="l" style="animation-delay:4.05s" x="24" y="324"><tspan fill="#8c8c92">  value        </tspan><tspan fill="#f6c878">⟨ never exposed to the agent ⟩</tspan></text>

  <text class="l" style="animation-delay:4.60s" x="24" y="360"><tspan fill="#6b6b72"># the agent only saw a ref + a fingerprint. the secret never touched its context.</tspan></text>
  <text class="l" style="animation-delay:4.95s" x="24" y="383"><tspan fill="#6b6b72"># same handoff works on ANY vendor portal — your agent drives the page,</tspan></text>
  <text class="l" style="animation-delay:5.25s" x="24" y="406"><tspan fill="#6b6b72"># secret-shuttle owns just the secret moment.  </tspan><tspan fill="#8f5a0a">(browser path: early / v0.5)</tspan></text>

  <rect class="cur" x="24" y="430" width="9" height="16" fill="#f6c878"/>
</svg>
